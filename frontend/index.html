<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentQA Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 24px;
      color: #1f2937;
    }
    .calculator {
      max-width: 520px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 28px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #1d4ed8; }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .result {
      margin-top: 18px;
      padding: 14px;
      background: #eef2ff;
      border-radius: 10px;
      min-height: 24px;
      font-weight: 600;
    }
    .hint {
      font-size: 13px;
      color: #6b7280;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h1>AgentQA Calculator</h1>
    <div class="row">
      <input id="num1" type="number" step="any" placeholder="First number" />
      <input id="num2" type="number" step="any" placeholder="Second number" />
    </div>
    <div class="row">
      <select id="operation">
        <option value="add">Add</option>
        <option value="subtract">Subtract</option>
        <option value="multiply">Multiply</option>
        <option value="divide">Divide</option>
        <option value="sin">Sin (degrees)</option>
        <option value="cos">Cos (degrees)</option>
        <option value="tan">Tan (degrees)</option>
        <option value="sqrt">Square Root</option>
        <option value="square">Square</option>
        <option value="cube">Cube</option>
      </select>
      <button onclick="calculate()">Calculate</button>
    </div>
    <div class="actions">
      <button onclick="setOperation('sin')">sin</button>
      <button onclick="setOperation('cos')">cos</button>
      <button onclick="setOperation('tan')">tan</button>
      <button onclick="setOperation('sqrt')">√</button>
      <button onclick="setOperation('square')">x²</button>
      <button onclick="setOperation('cube')">x³</button>
    </div>
    <div class="hint">Use the first input for single-value operations like sin, cos, tan, square root, square, and cube.</div>
    <div id="result" class="result">Result will appear here.</div>
  </div>

  <script>
    function setOperation(op) {
      document.getElementById('operation').value = op;
    }

    async function calculate() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const num2 = parseFloat(document.getElementById('num2').value);
      const operation = document.getElementById('operation').value;
      const resultBox = document.getElementById('result');

      if (Number.isNaN(num1)) {
        resultBox.textContent = 'Please enter at least the first number.';
        return;
      }

      try {
        const response = await fetch('http://localhost:5000/calculate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ num1, num2, operation })
        });

        const data = await response.json();
        if (!response.ok) {
          resultBox.textContent = data.error || 'Calculation failed.';
          return;
        }

        resultBox.textContent = `Result: ${data.result}`;
      } catch (error) {
        resultBox.textContent = 'Backend connection failed. Make sure the Python server is running on port 5000.';
      }
    }
  </script>
</body>
</html>
